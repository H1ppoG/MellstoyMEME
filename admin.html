<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Админка — Меллстрой мемы</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page-wrap">
    <h1>🛠 Админка</h1>
    <p class="submit-text">Здесь можно просматривать заявки и добавлять одобренные мемы на сайт.</p>

    <div class="submit">
      <div class="submit-row">
        <label for="admin-key">Админ-ключ</label>
        <input id="admin-key" type="password" placeholder="введи секретный ключ">
      </div>
      <button id="admin-load" class="submit-button">Загрузить заявки</button>
      <p id="admin-status" class="submit-status"></p>
    </div>

    <div id="admin-pending" class="admin-pending"></div>
  </div>

  <script src="admin.js"></script>
</body>
</html>
